<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Canceled — Rasna</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold:#C4A265; --deep:#160F09; --tufo:#E5D8C2; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter', sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #2a1c10 0%, var(--deep) 60%);
      color: var(--tufo);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .card { max-width: 520px; }
    h1 { font-family:'Cormorant Garamond', serif; font-size: clamp(2.2rem, 6vw, 3rem); color: var(--gold); font-weight: 600; margin-bottom: 1rem; }
    p { font-size: 1rem; font-weight: 300; line-height: 1.75; opacity: 0.8; margin-bottom: 0.9rem; }
    a { color: var(--gold); }
    .home-link { display:inline-block; margin-top: 2rem; padding: 0.9rem 2rem; border: 1.5px solid var(--gold); color: var(--gold); text-decoration:none; font-size:0.78rem; letter-spacing:0.15em; text-transform:uppercase; }
    .home-link:hover { background: var(--gold); color: var(--deep); }
  </style>
</head>
<body>
  <div class="card">
    <h1>No charge made</h1>
    <p>Your checkout was canceled and your card was not charged. Your spot was not reserved.</p>
    <p>Changed your mind or hit a snag? Email <a href="mailto:nikolai.fissenko1@gmail.com">nikolai.fissenko1@gmail.com</a> and we'll sort it out, or head back and try again.</p>
    <a class="home-link" href="/#book">Back to Rasna</a>
  </div>
</body>
</html>
